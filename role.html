<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Choose Role — OPINIO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --palatino:"Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
}
html,body{
  width:100%;min-height:100%;
  font-family:var(--palatino);
  overflow:hidden;
  background:#eaf4fb;
}

/* ── Soft light background ── */
.bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 15% 40%,rgba(0,180,220,0.13) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 20%,rgba(0,130,200,0.10) 0%,transparent 55%),
    radial-gradient(ellipse at 55% 80%,rgba(0,200,190,0.09) 0%,transparent 50%),
    linear-gradient(150deg,#ddf0fb 0%,#e8f7f8 45%,#d8f2f5 100%);
}
.orb{
  position:fixed;border-radius:50%;filter:blur(70px);
  animation:orbFloat ease-in-out infinite alternate;pointer-events:none;z-index:0;
}
.orb1{width:380px;height:380px;background:radial-gradient(circle,rgba(0,180,220,0.16),transparent 70%);top:-80px;left:-80px;animation-duration:13s;}
.orb2{width:320px;height:320px;background:radial-gradient(circle,rgba(0,210,200,0.13),transparent 70%);bottom:-60px;right:-60px;animation-duration:16s;animation-delay:3s;}
.orb3{width:220px;height:220px;background:radial-gradient(circle,rgba(60,160,255,0.10),transparent 70%);top:45%;left:55%;animation-duration:19s;animation-delay:1.5s;}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(28px,36px) scale(1.1)}}

/* floating particles */
.particles{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.particle{position:absolute;border-radius:50%;animation:particleDrift linear infinite;opacity:0;}
@keyframes particleDrift{
  0%{transform:translateY(110vh) translateX(0) scale(0);opacity:0;}
  10%{opacity:1;}90%{opacity:0.5;}
  100%{transform:translateY(-10vh) translateX(var(--drift)) scale(1.2);opacity:0;}
}

/* ── Page layout ── */
.page-wrap{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
}

/* ── Main card — light glass ── */
.role-card{
  width:100%;max-width:440px;
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1.5px solid rgba(255,255,255,0.95);
  border-radius:28px;
  padding:36px 28px 32px;
  box-shadow:
    0 2px 0 rgba(255,255,255,0.98) inset,
    0 24px 64px rgba(0,100,150,0.14),
    0 6px 20px rgba(0,130,170,0.09);
  animation:cardReveal 0.85s cubic-bezier(0.22,1,0.36,1) both;
  position:relative;overflow:hidden;
}
.role-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(0,200,220,0.5),transparent);
}
@keyframes cardReveal{
  from{opacity:0;transform:translateY(55px) scale(0.94)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── Brand ── */
.brand-line{text-align:center;margin-bottom:6px;animation:fadeUp 0.6s both;animation-delay:0.1s;}
.brand-text{
  font-family:var(--palatino);
  font-size:0.68rem;font-weight:700;
  letter-spacing:4px;text-transform:uppercase;
  color:rgba(0,150,190,0.55);
}

/* ── Heading ── */
.role-heading{
  font-family:var(--palatino);
  font-size:clamp(1.65rem,6vw,2rem);
  font-weight:800;
  color:#0d2a3a;
  text-align:center;letter-spacing:-0.5px;
  margin-bottom:6px;
  display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
  animation:fadeUp 0.6s both;animation-delay:0.16s;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.head-emoji{
  font-size:1.25rem;display:inline-block;
  animation:keyBounce 2.5s ease-in-out infinite;
}
@keyframes keyBounce{
  0%,100%{transform:rotate(0deg) scale(1)}
  25%{transform:rotate(14deg) scale(1.18)}
  75%{transform:rotate(-9deg) scale(1.08)}
}

/* ── Info ── */
.role-info{
  font-family:var(--palatino);
  font-size:0.82rem;color:#6a9aaa;font-style:italic;
  text-align:center;margin-bottom:26px;
  animation:fadeUp 0.6s both;animation-delay:0.22s;
}

/* ── Divider ── */
.divider{
  width:56px;height:2px;margin:0 auto 26px;
  background:linear-gradient(90deg,transparent,rgba(0,180,210,0.45),transparent);
  border-radius:2px;animation:fadeUp 0.6s both;animation-delay:0.26s;
}

/* ── Role grid ── */
.role-grid{display:flex;flex-direction:column;gap:14px;margin-bottom:22px;}
@media(min-width:420px){.role-grid{flex-direction:row;gap:16px;}}

/* ── Role button ── */
.role-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:13px;padding:28px 16px 24px;
  border:none;border-radius:22px;cursor:pointer;
  position:relative;overflow:hidden;
  font-family:var(--palatino);
  transform-style:preserve-3d;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.35s ease;
  opacity:0;transform:translateY(28px) scale(0.95);
  user-select:none;
}
.role-btn.visible{
  opacity:1;transform:translateY(0) scale(1);
  transition:opacity 0.55s cubic-bezier(0.22,1,0.36,1),transform 0.55s cubic-bezier(0.22,1,0.36,1),box-shadow 0.35s ease;
}
.role-btn.visible:hover{transform:translateY(-7px) scale(1.04) !important;}
.role-btn.visible:active{transform:translateY(-2px) scale(1.01) !important;}
.role-btn::after{
  content:'';position:absolute;top:0;left:-130%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.28),transparent);
  transform:skewX(-18deg);transition:left 0.55s ease;pointer-events:none;
}
.role-btn:hover::after{left:150%}
.role-btn::before{
  content:'';position:absolute;inset:0;border-radius:22px;
  border:1.5px solid transparent;
  transition:border-color 0.3s;pointer-events:none;
}
.role-btn:hover::before{border-color:rgba(255,255,255,0.6);}

/* Student — sky-blue */
.role-student{
  background:linear-gradient(145deg,#1aa8c8 0%,#0d90b8 45%,#0a6ea0 100%);
  box-shadow:0 8px 28px rgba(0,130,190,0.38),0 2px 8px rgba(0,100,160,0.22),0 0 0 1px rgba(255,255,255,0.15) inset;
}
.role-student:hover{
  box-shadow:0 18px 50px rgba(0,150,210,0.48),0 4px 14px rgba(0,120,180,0.28),0 0 0 1px rgba(255,255,255,0.2) inset;
}

/* Admin — teal-emerald */
.role-admin{
  background:linear-gradient(145deg,#0db8a8 0%,#0aa090 45%,#067878 100%);
  box-shadow:0 8px 28px rgba(0,160,148,0.38),0 2px 8px rgba(0,120,120,0.22),0 0 0 1px rgba(255,255,255,0.15) inset;
}
.role-admin:hover{
  box-shadow:0 18px 50px rgba(0,180,165,0.48),0 4px 14px rgba(0,150,140,0.28),0 0 0 1px rgba(255,255,255,0.2) inset;
}

/* ── Icon ring ── */
.role-icon-wrap{
  width:60px;height:60px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.4);
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),background 0.3s,box-shadow 0.3s;
  box-shadow:0 3px 14px rgba(0,0,0,0.14),0 0 0 1px rgba(255,255,255,0.12) inset;
}
.role-btn:hover .role-icon-wrap{
  transform:scale(1.14) translateZ(18px);
  background:rgba(255,255,255,0.25);
  box-shadow:0 8px 24px rgba(0,0,0,0.2),0 0 0 1px rgba(255,255,255,0.2) inset;
}
.role-icon{font-size:1.65rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.22));}
.role-name{
  font-family:var(--palatino);
  font-size:clamp(0.98rem,3.5vw,1.08rem);
  font-weight:700;color:#fff;text-align:center;
  text-shadow:0 1px 4px rgba(0,0,0,0.22);line-height:1.2;
}
.role-desc{
  font-family:var(--palatino);
  font-size:0.77rem;font-weight:400;
  color:rgba(255,255,255,0.72);text-align:center;
  margin-top:-6px;font-style:italic;
}
.role-badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.32);
  border-radius:20px;padding:3px 12px;
  font-family:var(--palatino);font-size:0.67rem;font-weight:700;
  color:rgba(255,255,255,0.88);letter-spacing:1px;text-transform:uppercase;
}

/* ── Back button ── */
.back-wrap{display:flex;justify-content:center;}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 30px;
  background:rgba(0,140,180,0.08);
  color:#1a6fa8;
  border:1.5px solid rgba(0,150,190,0.22);
  border-radius:50px;
  font-family:var(--palatino);
  font-size:0.9rem;font-weight:600;cursor:pointer;
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.28s,background 0.22s,color 0.22s;
  font-style:italic;
  animation:fadeUp 0.6s both;animation-delay:0.52s;
}
.back-btn:hover{
  background:rgba(0,150,190,0.14);color:#0a5a8e;
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 6px 20px rgba(0,120,170,0.15);
  border-color:rgba(0,160,200,0.35);
}
.back-btn:active{transform:scale(0.97)}
.back-arrow{font-size:0.95rem;transition:transform 0.22s;}
.back-btn:hover .back-arrow{transform:translateX(-4px)}

/* ── Login ID bar ── */
.loginid-bar{
  position:fixed;top:16px;right:16px;
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(14px);
  border:1px solid rgba(0,160,200,0.18);
  border-radius:50px;padding:7px 16px;
  font-family:var(--palatino);
  font-size:0.76rem;font-weight:600;
  color:#1a6fa8;z-index:100;
  box-shadow:0 3px 14px rgba(0,100,140,0.12);
  display:none;
}
.loginid-bar.show{display:block}

/* ── Toast ── */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(90px);
  padding:13px 26px;border-radius:50px;
  font-family:var(--palatino);font-size:0.88rem;font-weight:600;
  z-index:99999;opacity:0;
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;max-width:92vw;text-align:center;
  box-shadow:0 8px 30px rgba(0,0,0,0.18);pointer-events:none;
  background:rgba(10,40,80,0.88);color:#fff;
  backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.1);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:rgba(13,122,70,0.90)}
#toast.error{background:rgba(176,26,26,0.90)}
#toast.info{background:rgba(10,106,126,0.90)}

@media(max-width:380px){
  .role-card{padding:28px 18px 24px}
  .role-btn{padding:22px 12px 18px}
  .role-icon-wrap{width:52px;height:52px}
  .role-icon{font-size:1.4rem}
}
@media(min-width:600px){.role-card{padding:44px 40px 36px}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="particles" id="particles"></div>
<div class="loginid-bar" id="loginIdBar"></div>

<div class="page-wrap">
  <div class="role-card">
    <div class="brand-line"><span class="brand-text">OPINIO</span></div>
    <h1 class="role-heading">Choose Your Role <span class="head-emoji">🔑</span></h1>
    <p class="role-info" id="roleInfo">Department: — &nbsp;|&nbsp; Semester: —</p>
    <div class="divider"></div>
    <div class="role-grid">
      <button class="role-btn role-student" id="btnStudent" onclick="goStudent()">
        <div class="role-icon-wrap"><span class="role-icon">👤</span></div>
        <div class="role-name">Student Login</div>
        <div class="role-desc">Submit your feedback</div>
        <span class="role-badge">Student</span>
      </button>
      <button class="role-btn role-admin" id="btnAdmin" onclick="goAdmin()">
        <div class="role-icon-wrap"><span class="role-icon">🛡️</span></div>
        <div class="role-name">Admin Login</div>
        <div class="role-desc">Manage feedbacks</div>
        <span class="role-badge">Admin</span>
      </button>
    </div>
    <div class="back-wrap">
      <button class="back-btn" onclick="goBack()">
        <span class="back-arrow">←</span> Back
      </button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
(function(){
  const loginId=sessionStorage.getItem('opinio_loginId')||'';
  const deptName=sessionStorage.getItem('opinio_deptName')||'—';
  const sem=sessionStorage.getItem('opinio_sem')||'—';
  const bar=document.getElementById('loginIdBar');
  if(loginId){bar.textContent='👤 '+loginId;bar.classList.add('show');}
  document.getElementById('roleInfo').textContent='Department: '+deptName+' \u00A0|\u00A0 Semester: '+sem;
})();

(function(){
  const container=document.getElementById('particles');
  const colors=['rgba(0,180,220,0.55)','rgba(0,160,210,0.45)','rgba(0,200,190,0.4)','rgba(60,170,255,0.35)'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');p.className='particle';
    const size=Math.random()*3.5+1.5;
    const left=Math.random()*100;
    const dur=Math.random()*14+10;
    const delay=Math.random()*12;
    const drift=(Math.random()-0.5)*100+'px';
    const col=colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText=`width:${size}px;height:${size}px;left:${left}%;background:${col};animation-duration:${dur}s;animation-delay:${delay}s;--drift:${drift};box-shadow:0 0 ${size*2}px ${col};`;
    container.appendChild(p);
  }
})();

function initReveal(){
  const btns=document.querySelectorAll('.role-btn');
  btns.forEach((btn,i)=>{
    btn.style.transitionDelay=(i*0.12)+'s';
    setTimeout(()=>btn.classList.add('visible'),240+i*120);
  });
}

function init3DTilt(){
  document.querySelectorAll('.role-btn').forEach(btn=>{
    btn.addEventListener('mousemove',e=>{
      if(!btn.classList.contains('visible'))return;
      const r=btn.getBoundingClientRect();
      const cx=r.width/2,cy=r.height/2;
      const dx=e.clientX-r.left-cx,dy=e.clientY-r.top-cy;
      btn.style.transform=`translateY(-7px) scale(1.04) rotateX(${(dy/cy)*-10}deg) rotateY(${(dx/cx)*10}deg)`;
    });
    btn.addEventListener('mouseleave',()=>{btn.style.transform='';});
    btn.addEventListener('touchstart',e=>{
      btn.style.transform='translateY(-5px) scale(1.03)';
      const r=btn.getBoundingClientRect();
      const t=e.touches[0];
      createRipple(btn,t.clientX-r.left,t.clientY-r.top);
    },{passive:true});
    btn.addEventListener('touchend',()=>{setTimeout(()=>{btn.style.transform='';},200);},{passive:true});
    btn.addEventListener('click',e=>{
      const r=btn.getBoundingClientRect();
      createRipple(btn,e.clientX-r.left,e.clientY-r.top);
    });
  });
}

function createRipple(btn,x,y){
  const rip=document.createElement('span');
  rip.style.cssText=`position:absolute;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);left:${x-3}px;top:${y-3}px;pointer-events:none;animation:rippleOut 0.6s ease-out forwards;`;
  if(!document.getElementById('rs')){const s=document.createElement('style');s.id='rs';s.textContent='@keyframes rippleOut{0%{transform:scale(1);opacity:0.7}100%{transform:scale(35);opacity:0}}';document.head.appendChild(s);}
  btn.appendChild(rip);setTimeout(()=>rip.remove(),650);
}

function goStudent(){showToast('Opening feedback form...','info');setTimeout(()=>window.location.href='feedback.html',400);}
function goAdmin(){showToast('Opening admin login...','info');setTimeout(()=>window.location.href='adminlogin.html',400);}
function goBack(){window.location.href='auth.html';}

function showToast(msg,type='',duration=4000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(type?' '+type:'');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.classList.remove('show');setTimeout(()=>{t.className='';},400);},duration);
}

document.addEventListener('DOMContentLoaded',()=>{initReveal();init3DTilt();});
</script>
</body>
</html>
