<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Thank You — OPINIO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(145deg,#a8e8f0 0%,#b2ecec 40%,#c0f0ee 70%,#aae8f0 100%);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* ── animated bg blobs ── */
.blob{
  position:fixed;border-radius:50%;filter:blur(80px);opacity:0.22;
  animation:blobDrift ease-in-out infinite alternate;pointer-events:none;
}
.b1{width:380px;height:380px;background:#00bcd4;top:-80px;left:-80px;animation-duration:11s}
.b2{width:260px;height:260px;background:#00e5ff;bottom:5%;right:-50px;animation-duration:14s;animation-delay:2s}
.b3{width:200px;height:200px;background:#80deea;bottom:15%;left:10%;animation-duration:17s;animation-delay:1s}
.b4{width:140px;height:140px;background:#b2ebf2;top:30%;right:10%;animation-duration:9s;animation-delay:3s}
@keyframes blobDrift{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(20px,30px) scale(1.12)}
}

/* ── confetti pieces ── */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.c{
  position:absolute;top:-14px;
  width:10px;height:10px;
  border-radius:2px;
  animation:confettiFall linear forwards;
  opacity:0.85;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:0.9}
  80%{opacity:0.85}
  100%{transform:translateY(105vh) rotate(720deg);opacity:0}
}

/* ── main card ── */
.card{
  position:relative;z-index:10;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  border:2px solid rgba(255,255,255,0.88);
  border-radius:28px;
  padding:44px 32px 36px;
  max-width:420px;width:90%;
  text-align:center;
  box-shadow:
    0 2px 0 rgba(255,255,255,0.95) inset,
    0 32px 80px rgba(0,100,130,0.18),
    0 6px 22px rgba(0,100,130,0.10);
  animation:cardPop 0.8s cubic-bezier(0.22,1,0.36,1) both;
  animation-delay:0.3s;
}
@keyframes cardPop{
  0%{opacity:0;transform:scale(0.7) translateY(40px)}
  70%{transform:scale(1.04) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

/* ── checkmark circle ── */
.check-circle{
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(135deg,#1ab8cc,#00acc1);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 22px;
  box-shadow:0 8px 30px rgba(0,172,193,0.45),0 2px 10px rgba(0,172,193,0.28);
  animation:circleBounce 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
  animation-delay:0.7s;
  position:relative;
}
@keyframes circleBounce{
  0%{transform:scale(0) rotate(-180deg);opacity:0}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
/* glowing pulse ring */
.check-circle::after{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  border:3px solid rgba(0,188,212,0.35);
  animation:ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse{
  0%,100%{transform:scale(1);opacity:0.7}
  50%{transform:scale(1.12);opacity:0.2}
}
.check-icon{font-size:2.6rem;animation:checkAppear 0.4s ease both;animation-delay:1s}
@keyframes checkAppear{from{transform:scale(0)}to{transform:scale(1)}}

/* ── text ── */
.ty-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.7rem,6vw,2.1rem);
  font-weight:800;
  color:#0a6a7e;
  letter-spacing:-0.5px;
  margin-bottom:10px;
  animation:textRise 0.7s cubic-bezier(0.22,1,0.36,1) both;
  animation-delay:1s;
}
@keyframes textRise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.ty-sub{
  font-size:0.95rem;color:#4a7a8a;font-weight:500;
  line-height:1.6;margin-bottom:8px;
  animation:textRise 0.7s cubic-bezier(0.22,1,0.36,1) both;animation-delay:1.1s;
}
.ty-note{
  font-size:0.78rem;color:#8aacbc;font-weight:400;
  line-height:1.5;margin-bottom:28px;
  animation:textRise 0.7s cubic-bezier(0.22,1,0.36,1) both;animation-delay:1.2s;
}

/* ── student pill ── */
.student-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(0,188,212,0.10);
  border:1.5px solid rgba(0,188,212,0.25);
  border-radius:50px;padding:7px 18px;
  font-size:0.82rem;font-weight:700;color:#0a7a8e;
  margin-bottom:28px;
  animation:textRise 0.7s cubic-bezier(0.22,1,0.36,1) both;animation-delay:1.3s;
}

/* ── action buttons ── */
.btn-wrap{
  display:flex;flex-direction:column;gap:11px;
  animation:textRise 0.7s cubic-bezier(0.22,1,0.36,1) both;animation-delay:1.4s;
}
.btn{
  width:100%;padding:13px;border:none;border-radius:50px;
  font-family:'Syne',sans-serif;font-size:0.92rem;font-weight:700;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.28s ease;
  letter-spacing:0.1px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn::before{
  content:'';position:absolute;top:0;left:-120%;width:65%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);
  transform:skewX(-20deg);transition:left 0.5s ease;
}
.btn:hover::before{left:140%}
.btn:hover{transform:translateY(-2px) scale(1.015)}
.btn:active{transform:scale(0.97)}
.btn-teal{
  background:linear-gradient(135deg,#1ab8cc,#00acc1,#0097a7);color:#fff;
  box-shadow:0 6px 22px rgba(0,172,193,0.38),0 2px 7px rgba(0,172,193,0.22);
}
.btn-outline{
  background:#fff;color:#0a7a8e;
  border:2px solid rgba(0,188,212,0.30);
  box-shadow:0 3px 12px rgba(0,100,130,0.10);
}
.btn-outline:hover{background:#f0fafc}

/* ── auto redirect bar ── */
.redirect-bar{
  margin-top:18px;
  animation:textRise 0.7s cubic-bezier(0.22,1,0.36,1) both;animation-delay:1.5s;
}
.redirect-text{font-size:0.72rem;color:#8aacbc;margin-bottom:5px}
.progress-track{
  height:3px;border-radius:50px;
  background:rgba(0,188,212,0.15);
  overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:50px;
  background:linear-gradient(90deg,#1ab8cc,#00acc1);
  width:0%;
  transition:width linear;
}

/* ── footer ── */
.ty-footer{
  margin-top:20px;font-size:0.68rem;color:#a0bcc8;
  animation:textRise 0.7s cubic-bezier(0.22,1,0.36,1) both;animation-delay:1.6s;
}

/* responsive */
@media(max-width:380px){
  .card{padding:32px 20px 28px}
  .check-circle{width:76px;height:76px}
  .check-icon{font-size:2.2rem}
}
</style>
</head>
<body>

<!-- Animated blobs -->
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>
<div class="blob b4"></div>

<!-- Confetti container -->
<div class="confetti-wrap" id="confettiWrap"></div>

<div class="card">

  <!-- Check circle -->
  <div class="check-circle">
    <span class="check-icon">✓</span>
  </div>

  <!-- Title -->
  <div class="ty-title">Thank You! 🎉</div>
  <div class="ty-sub">Your feedback has been submitted successfully.</div>
  <div class="ty-note">Your responses will help improve the quality of teaching and learning.</div>

  <!-- Student pill -->
  <div class="student-pill" id="studentPill">
    👤 <span id="pillName">Student</span>
  </div>

  <!-- Buttons -->
  <div class="btn-wrap">
    <button class="btn btn-teal" onclick="goHome()">🏠 Back</button>
    <button class="btn btn-outline" onclick="goSignOut()">↪ Sign Out</button>
  </div>

  <!-- Auto redirect bar -->
  <div class="redirect-bar">
    <div class="redirect-text" id="redirectText">Redirecting to home in 10s...</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="ty-footer">
    OPINIO — Student Feedback Management App<br>
    © Developed by Syed Numan Pasha
  </div>

</div>

<script>
/* ════════════════════════════════════════
   CONFETTI
════════════════════════════════════════ */
(function launchConfetti(){
  const colors = [
    '#00bcd4','#1ab8cc','#00e5ff','#80deea',
    '#f5a623','#e53935','#8b34d9','#1db954',
    '#1a6fa8','#ffb300','#ff7043','#66bb6a'
  ];
  const wrap = document.getElementById('confettiWrap');
  const total = 80;

  for(let i = 0; i < total; i++){
    const c = document.createElement('div');
    c.className = 'c';
    const size    = 6 + Math.random() * 8;
    const left    = Math.random() * 100;
    const delay   = Math.random() * 2.5;
    const dur     = 2.5 + Math.random() * 2.5;
    const color   = colors[Math.floor(Math.random() * colors.length)];
    const shape   = Math.random() > 0.5 ? '50%' : '2px';
    c.style.cssText = `
      left:${left}%;
      width:${size}px;height:${size}px;
      background:${color};
      border-radius:${shape};
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    wrap.appendChild(c);
  }

  /* second burst at 1.5s */
  setTimeout(() => {
    for(let i = 0; i < 50; i++){
      const c = document.createElement('div');
      c.className = 'c';
      const size  = 5 + Math.random() * 7;
      const left  = Math.random() * 100;
      const dur   = 2.2 + Math.random() * 2;
      const color = colors[Math.floor(Math.random() * colors.length)];
      c.style.cssText = `
        left:${left}%;
        width:${size}px;height:${size}px;
        background:${color};
        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration:${dur}s;
        animation-delay:0s;
      `;
      wrap.appendChild(c);
      setTimeout(() => c.remove(), dur * 1000 + 200);
    }
  }, 1500);
})();

/* ════════════════════════════════════════
   FILL STUDENT NAME
════════════════════════════════════════ */
(function fillStudent(){
  const name    = sessionStorage.getItem('opinio_lastStudentName') || '';
  const loginId = sessionStorage.getItem('opinio_loginId') || '';
  const pill    = document.getElementById('pillName');
  pill.textContent = name || loginId || 'Student';
})();

/* ════════════════════════════════════════
   AUTO REDIRECT — 10 seconds
════════════════════════════════════════ */
let remaining = 10;
const fill    = document.getElementById('progressFill');
const txt     = document.getElementById('redirectText');

fill.style.transition = 'width ' + remaining + 's linear';
setTimeout(() => { fill.style.width = '100%'; }, 100);

const tick = setInterval(() => {
  remaining--;
  txt.textContent = `Redirecting to home in ${remaining}s...`;
  if(remaining <= 0){
    clearInterval(tick);
    goHome();
  }
}, 1000);

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function goHome(){
  clearInterval(tick);
  sessionStorage.clear();
  window.location.href = 'role.html';
}
function goSignOut(){
  clearInterval(tick);
  sessionStorage.clear();
  window.location.href = 'auth.html';
}
</script>
</body>
</html>
