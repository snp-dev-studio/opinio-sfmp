<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Feedback Results — OPINIO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:linear-gradient(160deg,#a8e8f0 0%,#b2ecec 40%,#b8f0ee 70%,#aae8f0 100%);
  --card-bg:rgba(255,255,255,0.93);
  --teal:#00acc1;--teal2:#00bcd4;
  --blue:#1a6fa8;--blue2:#1554a0;
  --green:#1db954;--red:#e53935;
  --green-soft:#e8f9ef;--green-border:#b2dfca;
  --red-soft:#ffeaea;--red-border:#f5bcbc;
  --text-dark:#0d2a38;--text-mid:#1e4a5e;--text-muted:#7a9aaa;
  --shadow:0 8px 30px rgba(0,80,110,0.13),0 2px 8px rgba(0,80,110,0.07);
  --radius:18px;--radius-btn:50px;
}
html,body{
  width:100%;min-height:100%;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  overflow-x:hidden;
}

/* ═══════════════════════════════════════
   PAGE WRAP
═══════════════════════════════════════ */
.page-wrap{
  max-width:760px;
  margin:0 auto;
  padding:16px 14px 70px;
  display:flex;flex-direction:column;gap:14px;
}

/* ═══════════════════════════════════════
   HEADER CARD
═══════════════════════════════════════ */
.header-card{
  background:var(--card-bg);border-radius:var(--radius);
  padding:20px 20px 16px;text-align:center;
  box-shadow:var(--shadow);border:1.5px solid rgba(255,255,255,0.88);
  animation:cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.header-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.3rem,5vw,1.7rem);
  font-weight:800;color:var(--blue);
  display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:5px;
}
.header-sub{font-size:0.84rem;color:var(--text-muted)}

/* ═══════════════════════════════════════
   STATS ROW — 3 tiles
═══════════════════════════════════════ */
.stats-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  animation:cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;animation-delay:0.06s;
}
.stat-tile{
  background:var(--card-bg);border-radius:var(--radius);
  padding:16px 10px 12px;text-align:center;
  box-shadow:var(--shadow);border:1.5px solid rgba(255,255,255,0.88);
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.stat-tile:hover{transform:translateY(-3px)}
.stat-num{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.5rem,5vw,2rem);
  font-weight:800;color:var(--text-dark);line-height:1;margin-bottom:4px;
}
.stat-label{font-size:0.72rem;color:var(--text-muted);font-weight:500}

/* ═══════════════════════════════════════
   HIGHLIGHT ROW — highest / lowest
═══════════════════════════════════════ */
.highlight-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  animation:cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;animation-delay:0.10s;
}
.highlight-card{
  border-radius:var(--radius);padding:13px 14px;
  box-shadow:var(--shadow);border:1.5px solid;
}
.hl-green{background:var(--green-soft);border-color:var(--green-border)}
.hl-red  {background:var(--red-soft);  border-color:var(--red-border)}
.hl-title{
  font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:800;
  display:flex;align-items:center;gap:5px;margin-bottom:6px;
}
.hl-green .hl-title{color:#1a7a3c}
.hl-red   .hl-title{color:#c0392b}
.hl-item{font-size:0.76rem;color:var(--text-mid);font-weight:500;line-height:1.7}
.hl-dot{font-size:0.65rem;margin-right:3px}

/* ═══════════════════════════════════════
   DETAILED PERFORMANCE TABLE
═══════════════════════════════════════ */
.table-card{
  background:var(--card-bg);border-radius:var(--radius);
  padding:18px 16px 14px;
  box-shadow:var(--shadow);border:1.5px solid rgba(255,255,255,0.88);
  animation:cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;animation-delay:0.14s;
}
.section-title{
  font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:800;
  color:var(--text-dark);margin-bottom:12px;
  display:flex;align-items:center;gap:7px;
}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid rgba(0,180,210,0.12)}
.perf-table{
  width:100%;border-collapse:collapse;
  font-size:0.76rem;min-width:460px;
}
.perf-table thead tr{background:var(--teal2)}
.perf-table thead th{
  padding:9px 11px;text-align:left;color:#fff;
  font-weight:700;font-size:0.75rem;white-space:nowrap;
}
.perf-table tbody tr{border-bottom:1px solid rgba(0,180,210,0.10)}
.perf-table tbody tr:last-child{border-bottom:none}
.perf-table tbody tr:hover{background:rgba(0,188,212,0.04)}
.perf-table td{
  padding:9px 11px;color:var(--text-mid);
  vertical-align:middle;line-height:1.5;font-size:0.75rem;
}
.perf-table td:first-child{font-weight:700;color:var(--text-dark);white-space:nowrap}
.perf-table td:nth-child(2){white-space:nowrap}
.avg-cell{font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem;color:var(--blue)}
.pct-cell{font-weight:700;font-size:0.82rem;color:var(--teal)}
/* row highlight */
.row-best{background:rgba(29,185,84,0.07)!important}
.row-worst{background:rgba(229,57,53,0.06)!important}
.param-cell{font-size:0.71rem;color:#4a6a7a;line-height:1.6}

/* ═══════════════════════════════════════
   BAR CHART CARD
═══════════════════════════════════════ */
.chart-card{
  background:var(--card-bg);border-radius:var(--radius);
  padding:18px 16px 20px;
  box-shadow:var(--shadow);border:1.5px solid rgba(255,255,255,0.88);
  animation:cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;animation-delay:0.18s;
}
.chart-wrap{position:relative;width:100%;height:240px;margin-top:10px}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.action-row{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  animation:cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;animation-delay:0.22s;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 24px;border:none;border-radius:var(--radius-btn);
  font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:700;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.28s;
  letter-spacing:0.1px;
}
.btn::before{
  content:'';position:absolute;top:0;left:-120%;width:65%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
  transform:skewX(-20deg);transition:left 0.5s ease;
}
.btn:hover::before{left:140%}
.btn:hover{transform:translateY(-2px) scale(1.02)}
.btn:active{transform:scale(0.97)}
.btn-teal{
  background:linear-gradient(135deg,#1ab8cc,#00acc1);color:#fff;
  box-shadow:0 5px 18px rgba(0,172,193,0.34);
}
.btn-blue{
  background:linear-gradient(135deg,#1a6fa8,#1554a0);color:#fff;
  box-shadow:0 5px 18px rgba(26,111,168,0.30);
}

/* ═══════════════════════════════════════
   LOADING / EMPTY
═══════════════════════════════════════ */
.loading-msg,.empty-msg{
  text-align:center;padding:30px 20px;
  font-size:0.9rem;color:var(--text-muted);
}
.spinner{
  display:inline-block;width:28px;height:28px;
  border:3px solid rgba(0,188,212,0.25);
  border-top-color:var(--teal2);
  border-radius:50%;animation:spin 0.7s linear infinite;
  margin-bottom:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(90px);
  padding:13px 26px;border-radius:50px;
  font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;
  z-index:9999;opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;max-width:92vw;text-align:center;
  box-shadow:0 8px 30px rgba(0,0,0,0.22);pointer-events:none;
  background:#1a2a4a;color:#fff;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:linear-gradient(135deg,#0d7a46,#0fa356)}
#toast.error{background:linear-gradient(135deg,#b01a1a,#d42020)}
#toast.info{background:linear-gradient(135deg,#0a6a7e,#00acc1)}

@media(max-width:380px){
  .highlight-row{grid-template-columns:1fr}
  .stats-row .stat-num{font-size:1.3rem}
}
@media(min-width:600px){
  .page-wrap{padding:24px 20px 80px}
  .chart-wrap{height:280px}
}
</style>
</head>
<body>

<div class="page-wrap">

  <!-- Header -->
  <div class="header-card">
    <div class="header-title">
      Feedback Results <span>📊</span>
    </div>
    <div class="header-sub" id="headerSub">— · Semester —</div>
  </div>

  <!-- Stats row -->
  <div class="stats-row" id="statsRow">
    <div class="stat-tile"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total Feedbacks</div></div>
    <div class="stat-tile"><div class="stat-num" id="statFaculties">—</div><div class="stat-label">Faculties</div></div>
    <div class="stat-tile"><div class="stat-num" id="statSubjects">—</div><div class="stat-label">Subjects</div></div>
  </div>

  <!-- Highest / Lowest -->
  <div class="highlight-row" id="highlightRow" style="display:none">
    <div class="highlight-card hl-green">
      <div class="hl-title">🏆 Highest Rated</div>
      <div id="hlBest" class="hl-item">—</div>
    </div>
    <div class="highlight-card hl-red">
      <div class="hl-title">👎 Lowest Rated</div>
      <div id="hlWorst" class="hl-item">—</div>
    </div>
  </div>

  <!-- Detailed Performance Table -->
  <div class="table-card">
    <div class="section-title">📋 Detailed Performance Table</div>
    <div id="tableArea">
      <div class="loading-msg"><div class="spinner"></div><br>Loading feedback data...</div>
    </div>
  </div>

  <!-- Bar Chart -->
  <div class="chart-card" id="chartCard" style="display:none">
    <div class="section-title">📈 Faculty Performance Chart (Top 10)</div>
    <div class="chart-wrap">
      <canvas id="perfChart"></canvas>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="action-row">
    <button class="btn btn-teal" onclick="downloadPDF()">📄 Download PDF Report</button>
    <button class="btn btn-blue" onclick="goBack()">← Back to Admin</button>
  </div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyA_mhiq57BO4DH7TIDtlzw3-kUfzRLm0k0",
  authDomain:"opinio-e813a.firebaseapp.com",
  projectId:"opinio-e813a",
  storageBucket:"opinio-e813a.firebasestorage.app",
  messagingSenderId:"553281150769",
  appId:"1:553281150769:web:f7f154a9a4d23588c25a10"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const loginId  = sessionStorage.getItem('opinio_loginId')  || '';
const dept     = sessionStorage.getItem('opinio_dept')     || '';
const sem      = sessionStorage.getItem('opinio_sem')      || '';
const deptName = sessionStorage.getItem('opinio_deptName') || dept;

document.getElementById('headerSub').textContent = `${deptName} - Semester ${sem}`;

let chartInstance = null;
let computedRows  = []; // for PDF

/* ════════════════════════════════════════
   LOAD & PROCESS FEEDBACKS
════════════════════════════════════════ */
async function loadResults(){
  /* Guard: all three session keys must be non-empty to build a valid Firestore path */
  if(!dept || !sem || !loginId){
    document.getElementById('tableArea').innerHTML =
      '<div class="empty-msg">⚠️ Session expired or missing. Please go back and sign in again.</div>';
    document.getElementById('statTotal').textContent     = '0';
    document.getElementById('statFaculties').textContent = '0';
    document.getElementById('statSubjects').textContent  = '0';
    showToast('⚠️ Session missing — please sign in again', 'error');
    return;
  }

  try {
    const path = `departments/${dept}/semesters/${sem}/accounts/${loginId}/feedbacks`;
    const snap = await getDocs(collection(db, path));
    const feedbacks = snap.docs.map(d => d.data());

    document.getElementById('statTotal').textContent = feedbacks.length;

    if(!feedbacks.length){
      document.getElementById('tableArea').innerHTML =
        '<div class="empty-msg">No feedbacks submitted yet</div>';
      document.getElementById('statFaculties').textContent = '0';
      document.getElementById('statSubjects').textContent  = '0';
      return;
    }

    processAndRender(feedbacks);
  } catch(e){
    document.getElementById('tableArea').innerHTML =
      `<div class="empty-msg">❌ Error loading: ${e.message}</div>`;
    showToast('❌ ' + e.message, 'error');
  }
}

/* ════════════════════════════════════════
   PROCESS — aggregate per faculty+subject
════════════════════════════════════════ */
function processAndRender(feedbacks){
  // Map: "faculty|subject" → { faculty, subject, paramTotals:{}, paramCounts:{}, count }
  const map = {};

  feedbacks.forEach(fb => {
    const subjects = fb.subjects || [];
    subjects.forEach(s => {
      const key = `${s.facultyName||'—'}|${s.subjectName||'—'}`;
      if(!map[key]){
        map[key] = {
          faculty: s.facultyName || '—',
          subject: s.subjectName || '—',
          paramTotals: {}, paramCounts: {}, count: 0
        };
      }
      const entry = map[key];
      entry.count++;
      const ratings = s.ratings || {};
      Object.entries(ratings).forEach(([param, val]) => {
        entry.paramTotals[param] = (entry.paramTotals[param] || 0) + Number(val);
        entry.paramCounts[param] = (entry.paramCounts[param] || 0) + 1;
      });
    });
  });

  // Compute averages per row
  computedRows = Object.values(map).map(entry => {
    const paramAvgs = {};
    let totalSum = 0, totalCount = 0;
    Object.keys(entry.paramTotals).forEach(p => {
      const avg = entry.paramTotals[p] / entry.paramCounts[p];
      paramAvgs[p] = avg;
      totalSum   += avg;
      totalCount++;
    });
    const overallAvg = totalCount ? totalSum / totalCount : 0;
    const percentage = (overallAvg / 5 * 100).toFixed(1);
    return { ...entry, paramAvgs, overallAvg, percentage };
  });

  // Sort by overallAvg descending
  computedRows.sort((a, b) => b.overallAvg - a.overallAvg);

  // Stats
  const faculties = [...new Set(computedRows.map(r => r.faculty))];
  const subjects  = [...new Set(computedRows.map(r => r.subject))];
  document.getElementById('statFaculties').textContent = faculties.length;
  document.getElementById('statSubjects').textContent  = subjects.length;

  // Highlight best / worst
  if(computedRows.length){
    const best  = computedRows[0];
    const worst = computedRows[computedRows.length - 1];
    document.getElementById('hlBest').innerHTML =
      `<span class="hl-dot">•</span>${best.faculty} (${best.subject}) - ${best.overallAvg.toFixed(2)}/5 (${best.percentage}%)`;
    document.getElementById('hlWorst').innerHTML =
      `<span class="hl-dot">•</span>${worst.faculty} (${worst.subject}) - ${worst.overallAvg.toFixed(2)}/5 (${worst.percentage}%)`;
    document.getElementById('highlightRow').style.display = 'grid';
  }

  renderTable(computedRows);
  renderChart(computedRows.slice(0, 10));
}

/* ════════════════════════════════════════
   RENDER TABLE
════════════════════════════════════════ */
function renderTable(rows){
  if(!rows.length){
    document.getElementById('tableArea').innerHTML =
      '<div class="empty-msg">No data to display</div>';
    return;
  }

  const best  = rows[0].overallAvg;
  const worst = rows[rows.length-1].overallAvg;

  const bodyRows = rows.map((r, i) => {
    const rowClass = r.overallAvg === best  ? 'row-best'  :
                     r.overallAvg === worst ? 'row-worst' : '';
    const paramLines = Object.entries(r.paramAvgs)
      .map(([p, v]) => `${p}: ${v.toFixed(2)}/5`)
      .join('<br>');
    return `
      <tr class="${rowClass}">
        <td>${esc(r.faculty)}</td>
        <td>${esc(r.subject)}</td>
        <td class="param-cell">${paramLines || '—'}</td>
        <td class="avg-cell">${r.overallAvg.toFixed(2)}</td>
        <td class="pct-cell">${r.percentage}%</td>
      </tr>`;
  }).join('');

  document.getElementById('tableArea').innerHTML = `
    <div class="table-wrap">
      <table class="perf-table">
        <thead>
          <tr>
            <th>Faculty</th>
            <th>Subject</th>
            <th>Parameter Ratings</th>
            <th>Overall Avg (out of 5)</th>
            <th>Percentage</th>
          </tr>
        </thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>`;
}

/* ════════════════════════════════════════
   RENDER CHART
════════════════════════════════════════ */
function renderChart(rows){
  if(!rows.length) return;
  document.getElementById('chartCard').style.display = 'block';

  const labels = rows.map(r => r.faculty);
  const data   = rows.map(r => parseFloat(r.overallAvg.toFixed(2)));

  // colour gradient based on value
  const colors = data.map(v =>
    v >= 4   ? 'rgba(0,188,212,0.88)' :
    v >= 3   ? 'rgba(0,172,193,0.82)' :
               'rgba(0,151,170,0.75)'
  );

  if(chartInstance) chartInstance.destroy();

  const ctx = document.getElementById('perfChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets:[{
        label:'Overall Avg (out of 5)',
        data,
        backgroundColor: colors,
        borderColor: colors.map(c => c.replace('0.88','1').replace('0.82','1').replace('0.75','1')),
        borderWidth: 0,
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label: ctx => ` ${ctx.parsed.y.toFixed(2)} / 5  (${(ctx.parsed.y/5*100).toFixed(1)}%)`
          },
          backgroundColor:'rgba(10,40,70,0.88)',
          padding:10,
          cornerRadius:10,
          titleFont:{family:'Syne',weight:'700'},
          bodyFont:{family:'DM Sans'}
        }
      },
      scales:{
        y:{
          min:0,max:5,
          ticks:{stepSize:1,color:'#7a9aaa',font:{family:'DM Sans',size:11}},
          grid:{color:'rgba(0,180,210,0.12)'},
          border:{display:false}
        },
        x:{
          ticks:{color:'#4a6a7a',font:{family:'DM Sans',size:11},maxRotation:30},
          grid:{display:false},
          border:{display:false}
        }
      },
      animation:{duration:800,easing:'easeOutQuart'}
    }
  });
}

/* ════════════════════════════════════════
   PDF DOWNLOAD
════════════════════════════════════════ */
window.downloadPDF = function(){
  if(!computedRows.length){ showToast('No data to export','info'); return; }

  const rowsHtml = computedRows.map((r, i) => {
    const params = Object.entries(r.paramAvgs)
      .map(([p,v]) => `${p}: ${v.toFixed(2)}/5`).join(' | ');
    const rowBg = i === 0                         ? '#e8f9ef' :
                  i === computedRows.length - 1   ? '#ffeaea' : '#fff';
    return `<tr style="background:${rowBg}">
      <td>${r.faculty}</td>
      <td>${r.subject}</td>
      <td>${params||'—'}</td>
      <td style="font-weight:700;color:#1a6fa8">${r.overallAvg.toFixed(2)}</td>
      <td style="font-weight:700;color:#00acc1">${r.percentage}%</td>
    </tr>`;
  }).join('');

  const best  = computedRows[0];
  const worst = computedRows[computedRows.length-1];

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <title>OPINIO Feedback Results</title>
  <style>
    body{font-family:'DM Sans',sans-serif;font-size:11px;color:#1a1f36;padding:24px}
    h1{font-size:18px;color:#1a6fa8;margin-bottom:3px}
    .sub{font-size:10px;color:#7a9aaa;margin-bottom:16px}
    .stats{display:flex;gap:16px;margin-bottom:14px}
    .stat{background:#f0f7fb;border-radius:8px;padding:8px 14px;font-size:11px}
    .stat b{display:block;font-size:16px;color:#0d2a38}
    .highlight{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .hl{border-radius:8px;padding:8px 12px;font-size:10px}
    .hl-g{background:#e8f9ef;border:1px solid #b2dfca;color:#1a7a3c}
    .hl-r{background:#ffeaea;border:1px solid #f5bcbc;color:#c0392b}

window.goBack = function(){ window.location.href = 'adminpanel.html'; };

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ════════════════════════════════════════
   TOAST — 4 seconds
════════════════════════════════════════ */
window.showToast = function(msg, type='', duration=4000){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show'+(type?' '+type:'');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{
    t.classList.remove('show');
    setTimeout(()=>{ t.className=''; },400);
  }, duration);
};
